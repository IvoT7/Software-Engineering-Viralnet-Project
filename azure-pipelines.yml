trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- script: |
    python --version
    python -m pip install --upgrade pip
  displayName: 'Setup Environment'

- script: |
    pip install -r requirements.txt
  displayName: 'Install Backend Dependencies'
  workingDirectory: 'Software Engineering Viralnet Project/backend'


- script: |
    python -c "import sys; print('Backend environment verified and ready.')"
  displayName: 'Run Sanity Check'
  workingDirectory: 'Software Engineering Viralnet Project/backend'

