trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
# Step 1: Debugging - This will list the real file structure
- script: |
    echo "--- Root directory contents ---"
    ls -R
  displayName: 'DEBUG: Show all files'

# Step 2: Build Backend
- script: |
    npm install
  displayName: 'Build Backend'
  workingDirectory: 'backend' # I removed the subfolder prefix

# Step 3: Build Frontend
- script: |
    npm install
  displayName: 'Build Frontend'
  workingDirectory: 'frontend' # I removed the subfolder prefix